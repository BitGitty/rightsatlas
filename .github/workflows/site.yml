name: build-and-deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"   # nightly: link health + rebuild (keeps cutoff year fresh)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Link health check
        run: python scripts/linkcheck.py
      - name: Commit link status (keepalive)
        run: |
          git config user.name "rightsatlas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/link_status.json
          git diff --cached --quiet || git commit -m "nightly link status"
          git push
        continue-on-error: true
      - name: Build site
        env:
          BASE_URL: /rightsatlas/
          SITE_ORIGIN: https://${{ github.repository_owner }}.github.io
        run: python build.py
      - name: Acceptance tests (evidence gates, cutoff, no-leak)
        run: python tests/test_acceptance.py
      - uses: actions/upload-pages-artifact@v3
        with: { path: site }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
