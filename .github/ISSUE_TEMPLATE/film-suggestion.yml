name: Suggest a film or improvement
description: Suggest a film to research, or tell us how to make RightsAtlas better
title: "[Suggestion] "
labels: ["suggestion"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: What's this about?
      options:
        - A film to research
        - A correction or broken link
        - A feature or improvement idea
        - Something else
    validations:
      required: true
  - type: input
    id: film
    attributes:
      label: Film title and year (if suggesting a film)
      placeholder: "e.g. Gorgo (1961)"
    validations:
      required: false
  - type: textarea
    id: detail
    attributes:
      label: Details
      description: What's interesting, what's wrong, or what you'd like to see. Anything helps.
      placeholder: "Disputed status? A strike story? A broken link? A feature you wish existed?"
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Links you already found (optional)
      placeholder: "Renewal records, articles, court cases, archive copies…"
    validations:
      required: false
